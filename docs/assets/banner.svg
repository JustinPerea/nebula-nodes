<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="Nebula Nodes">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0416"/>
      <stop offset="55%" stop-color="#140a2e"/>
      <stop offset="100%" stop-color="#1a0933"/>
    </linearGradient>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#863bff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#863bff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#47bfff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#47bfff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wire" x1="0" x2="1">
      <stop offset="0%" stop-color="#863bff"/>
      <stop offset="100%" stop-color="#47bfff"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="320" fill="url(#bg)"/>
  <ellipse cx="180" cy="90" rx="300" ry="180" fill="url(#glowPurple)"/>
  <ellipse cx="1040" cy="260" rx="300" ry="180" fill="url(#glowCyan)"/>

  <!-- faint grid -->
  <g stroke="#2a1a4a" stroke-width="1" opacity="0.35">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
    <line x1="1000" y1="0" x2="1000" y2="320"/>
  </g>

  <!-- decorative nodes + wires (bottom right) -->
  <g opacity="0.85">
    <!-- wires -->
    <path d="M 900 90 C 960 90, 960 160, 1020 160" stroke="url(#wire)" stroke-width="2.5" fill="none"/>
    <path d="M 900 230 C 960 230, 960 160, 1020 160" stroke="url(#wire)" stroke-width="2.5" fill="none"/>
    <path d="M 1080 160 C 1130 160, 1130 160, 1160 160" stroke="#47bfff" stroke-width="2.5" fill="none" opacity="0.7"/>

    <!-- node a -->
    <rect x="830" y="68" width="70" height="44" rx="8" fill="#1a1033" stroke="#863bff" stroke-width="1.5"/>
    <circle cx="900" cy="90" r="4" fill="#863bff"/>
    <!-- node b -->
    <rect x="830" y="208" width="70" height="44" rx="8" fill="#1a1033" stroke="#863bff" stroke-width="1.5"/>
    <circle cx="900" cy="230" r="4" fill="#863bff"/>
    <!-- node c (merge) -->
    <rect x="1020" y="138" width="60" height="44" rx="8" fill="#1a1033" stroke="#47bfff" stroke-width="1.5"/>
    <circle cx="1020" cy="160" r="4" fill="#47bfff"/>
    <circle cx="1080" cy="160" r="4" fill="#47bfff"/>
  </g>

  <!-- lightning mark (inspired by favicon) -->
  <g transform="translate(88 110)">
    <path d="M25.946 44.938c-.664.845-2.021.375-2.021-.698V33.937a2.26 2.26 0 0 0-2.262-2.262H10.287c-.92 0-1.456-1.04-.92-1.788l7.48-10.471c1.07-1.497 0-3.578-1.842-3.578H1.237c-.92 0-1.456-1.04-.92-1.788L10.013.474c.214-.297.556-.474.92-.474h28.894c.92 0 1.456 1.04.92 1.788l-7.48 10.471c-1.07 1.498 0 3.579 1.842 3.579h11.377c.943 0 1.473 1.088.89 1.83L25.947 44.94z"
          fill="#863bff" transform="scale(2.1)"/>
  </g>

  <!-- wordmark -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Inter, sans-serif" fill="#ede6ff">
    <text x="320" y="160" font-size="78" font-weight="800" letter-spacing="-2">Nebula Nodes</text>
    <text x="322" y="210" font-size="24" font-weight="400" fill="#b9a8e6" letter-spacing="0.3">Visual AI pipelines. Your keys. Your machine.</text>
  </g>
</svg>
