<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="Nebula Nodes / Daedalus — a node-based canvas for artistic AI, spoken to in plain language">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f3e6c4" stroke-width="0.5" opacity="0.06"/>
    </pattern>
    <radialGradient id="vellum" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#6ba8d6" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#6ba8d6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cyanrule" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#6ba8d6" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#6ba8d6" stop-opacity="1.0"/>
      <stop offset="100%" stop-color="#6ba8d6" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- ground: deep green-black ink (Verdant) -->
  <rect width="1200" height="320" fill="#0a1612"/>
  <rect width="1200" height="320" fill="url(#grid)"/>
  <rect width="1200" height="320" fill="url(#vellum)"/>

  <!-- top + bottom hairline rules (parchment soft) -->
  <rect x="0" y="0" width="1200" height="1" fill="#f3e6c4" opacity="0.28"/>
  <rect x="0" y="319" width="1200" height="1" fill="#f3e6c4" opacity="0.14"/>

  <!-- corner manuscript bullets (square) -->
  <g fill="#6ba8d6">
    <rect x="20" y="20" width="6" height="6"/>
    <rect x="1174" y="20" width="6" height="6"/>
    <rect x="20" y="294" width="6" height="6"/>
    <rect x="1174" y="294" width="6" height="6"/>
  </g>

  <!-- top-left eyebrow: hackathon track + class identifiers -->
  <g font-family="'IBM Plex Mono', ui-monospace, monospace" fill="#f3e6c4">
    <text x="56" y="46" font-size="11" letter-spacing="2.5" opacity="0.55">HERMES AGENT // CREATIVE HACKATHON 2026</text>
    <text x="56" y="64" font-size="11" letter-spacing="2.5" fill="#6ba8d6">ATELIER // KIMI K2.6 · NOUS PORTAL</text>
  </g>

  <!-- top-right station meta -->
  <g font-family="'IBM Plex Mono', ui-monospace, monospace" fill="#f3e6c4" text-anchor="end">
    <text x="1144" y="46" font-size="11" letter-spacing="2" opacity="0.55">STATION-04 // VERDANT</text>
    <text x="1144" y="64" font-size="11" letter-spacing="2" opacity="0.40">RUN: BYOK · LOCAL · OFFLINE-CAPABLE</text>
  </g>

  <!-- main wordmark — Cormorant Garamond serif italic, the manuscript way -->
  <g font-family="'Cormorant Garamond', 'Times New Roman', serif">
    <text x="56" y="180" font-size="92" font-weight="600" letter-spacing="2" fill="#f3e6c4">NEBULA NODES</text>
    <text x="58" y="220" font-size="28" font-weight="500" font-style="italic" letter-spacing="0" fill="#6ba8d6">— Daedalus, master craftsman of the canvas</text>
  </g>

  <!-- subtitle: prose, parchment-dim -->
  <g font-family="'IBM Plex Mono', ui-monospace, monospace" fill="#f3e6c4">
    <text x="58" y="252" font-size="13" letter-spacing="0.5" opacity="0.65">A node-based canvas for artistic AI &#8212; spoken to in plain language.</text>
  </g>

  <!-- cyanotype filament rule -->
  <rect x="56" y="270" width="540" height="1.5" fill="url(#cyanrule)"/>

  <!-- bottom strip: KEYS / NODES / GRAPHS read like instrument labels -->
  <g font-family="'IBM Plex Mono', ui-monospace, monospace" fill="#f3e6c4">
    <text x="56" y="296" font-size="11" letter-spacing="3" opacity="0.55">YOUR KEYS</text>
    <text x="220" y="296" font-size="11" letter-spacing="3" opacity="0.55">YOUR MACHINE</text>
    <text x="412" y="296" font-size="11" letter-spacing="3" opacity="0.55">YOUR GRAPHS</text>
  </g>

  <!-- right-side schematic: a small canonical pipeline as ruled manuscript leaves -->
  <g transform="translate(720 100)" stroke="#f3e6c4" stroke-width="1" fill="none" opacity="0.85">
    <!-- node plates: square hairline borders, ink-2 fill -->
    <rect x="0" y="40" width="92" height="36" fill="#0e1c18"/>
    <rect x="160" y="0" width="92" height="36" fill="#0e1c18"/>
    <rect x="160" y="80" width="92" height="36" fill="#0e1c18"/>
    <rect x="320" y="40" width="92" height="36" fill="#0e1c18"/>
    <rect x="320" y="120" width="92" height="36" fill="#0e1c18" stroke="#6ba8d6"/>

    <!-- cyanotype top-rule on the active leaf -->
    <line x1="320" y1="120" x2="412" y2="120" stroke="#6ba8d6" stroke-width="2"/>

    <!-- ports (cyanotype dots) -->
    <g fill="#6ba8d6" stroke="none">
      <rect x="89" y="56" width="5" height="5"/>
      <rect x="156" y="16" width="5" height="5"/>
      <rect x="156" y="96" width="5" height="5"/>
      <rect x="249" y="16" width="5" height="5"/>
      <rect x="249" y="96" width="5" height="5"/>
      <rect x="316" y="56" width="5" height="5"/>
      <rect x="316" y="136" width="5" height="5"/>
    </g>

    <!-- wires -->
    <path d="M 92 58 L 126 58 L 126 18 L 160 18"/>
    <path d="M 92 58 L 126 58 L 126 98 L 160 98"/>
    <path d="M 252 18 L 286 18 L 286 58 L 320 58"/>
    <path d="M 252 98 L 286 98 L 286 58"/>
    <path d="M 412 58 L 446 58 L 446 138 L 412 138" stroke="#6ba8d6"/>

    <!-- labels under each plate, mono caps -->
    <g font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" letter-spacing="1.5" fill="#f3e6c4" opacity="0.55" stroke="none">
      <text x="0" y="92">PROMPT</text>
      <text x="160" y="-8">IMAGE</text>
      <text x="160" y="132">REF</text>
      <text x="320" y="92">EDIT</text>
      <text x="320" y="172" fill="#6ba8d6">VIDEO &#9658;</text>
    </g>

    <!-- italic name label, manuscript margin note -->
    <text x="0" y="180" font-family="'Cormorant Garamond', serif" font-style="italic" font-size="13" fill="#f3e6c4" opacity="0.55" stroke="none">a Daedalus pipeline.</text>
  </g>
</svg>
