<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="Nebula Nodes — Daedalus, master craftsman of the canvas">
  <defs>
    <linearGradient id="filament" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#DCFF00" stop-opacity="0.0"/>
      <stop offset="40%" stop-color="#DCFF00" stop-opacity="1.0"/>
      <stop offset="60%" stop-color="#DCFF00" stop-opacity="1.0"/>
      <stop offset="100%" stop-color="#DCFF00" stop-opacity="0.0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#E8E2D2" stroke-width="0.5" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- ground: pure near-black -->
  <rect width="1200" height="320" fill="#0A0A0A"/>
  <rect width="1200" height="320" fill="url(#grid)"/>

  <!-- top + bottom hairlines -->
  <rect x="0" y="0" width="1200" height="1" fill="#E8E2D2" opacity="0.20"/>
  <rect x="0" y="319" width="1200" height="1" fill="#E8E2D2" opacity="0.14"/>

  <!-- corner diamonds (TDR ornament) -->
  <g fill="#DCFF00">
    <polygon points="20,20 28,28 20,36 12,28"/>
    <polygon points="1180,20 1188,28 1180,36 1172,28"/>
    <polygon points="20,284 28,292 20,300 12,292"/>
    <polygon points="1180,284 1188,292 1180,300 1172,292"/>
  </g>

  <!-- top-left eyebrow: track + class identifiers -->
  <g font-family="'IBM Plex Mono', ui-monospace, monospace" fill="#E8E2D2">
    <text x="56" y="46" font-size="11" letter-spacing="2.5" opacity="0.55">HERMES AGENT // CREATIVE HACKATHON 2026</text>
    <text x="56" y="64" font-size="11" letter-spacing="2.5" fill="#DCFF00">ENTRY-CLASS // KIMI K2.6 · NOUS PORTAL</text>
  </g>

  <!-- top-right station meta -->
  <g font-family="'IBM Plex Mono', ui-monospace, monospace" fill="#E8E2D2" text-anchor="end">
    <text x="1144" y="46" font-size="11" letter-spacing="2" opacity="0.55">STATION-04 // ATELIER</text>
    <text x="1144" y="64" font-size="11" letter-spacing="2" opacity="0.40">RUN: BYOK · LOCAL · OFFLINE-CAPABLE</text>
  </g>

  <!-- main wordmark — display type, near-monospace, instrument-spec -->
  <g font-family="'Geist Mono', 'IBM Plex Mono', ui-monospace, monospace">
    <text x="56" y="180" font-size="84" font-weight="800" letter-spacing="-3" fill="#E8E2D2">NEBULA NODES</text>
    <text x="56" y="216" font-size="22" font-weight="500" letter-spacing="0" fill="#DCFF00">/&#8201;DAEDALUS</text>
  </g>

  <!-- subtitle: chisel-cut, single line -->
  <g font-family="'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" fill="#E8E2D2">
    <text x="58" y="252" font-size="18" font-weight="500" letter-spacing="0" opacity="0.75">A node-based canvas for artistic AI &#8212; spoken to in plain language.</text>
  </g>

  <!-- yellow filament rule -->
  <rect x="56" y="270" width="540" height="2" fill="url(#filament)"/>

  <!-- bottom strip: KEYS / NODES / GRAPHS read like instrument labels -->
  <g font-family="'IBM Plex Mono', ui-monospace, monospace" fill="#E8E2D2">
    <text x="56" y="296" font-size="11" letter-spacing="3" opacity="0.55">YOUR KEYS</text>
    <text x="220" y="296" font-size="11" letter-spacing="3" opacity="0.55">YOUR MACHINE</text>
    <text x="412" y="296" font-size="11" letter-spacing="3" opacity="0.55">YOUR GRAPHS</text>
  </g>

  <!-- right-side schematic: a small canonical pipeline rendered in mono lines -->
  <g transform="translate(720 100)" stroke="#E8E2D2" stroke-width="1" fill="none" opacity="0.85">
    <!-- nodes: square plates, hairline border, yellow port mark -->
    <rect x="0" y="40" width="92" height="36"/>
    <rect x="160" y="0" width="92" height="36"/>
    <rect x="160" y="80" width="92" height="36"/>
    <rect x="320" y="40" width="92" height="36"/>
    <rect x="320" y="120" width="92" height="36" stroke="#DCFF00"/>

    <!-- ports (yellow filament) -->
    <g fill="#DCFF00" stroke="none">
      <rect x="90" y="56" width="4" height="4"/>
      <rect x="158" y="16" width="4" height="4"/>
      <rect x="158" y="96" width="4" height="4"/>
      <rect x="250" y="16" width="4" height="4"/>
      <rect x="250" y="96" width="4" height="4"/>
      <rect x="318" y="56" width="4" height="4"/>
      <rect x="318" y="136" width="4" height="4"/>
    </g>

    <!-- wires: clean orthogonal -->
    <path d="M 92 58 L 126 58 L 126 18 L 160 18"/>
    <path d="M 92 58 L 126 58 L 126 98 L 160 98"/>
    <path d="M 252 18 L 286 18 L 286 58 L 320 58"/>
    <path d="M 252 98 L 286 98 L 286 58"/>
    <path d="M 412 58 L 446 58 L 446 138 L 412 138" stroke="#DCFF00"/>

    <!-- labels under each plate -->
    <g font-family="'IBM Plex Mono', ui-monospace, monospace" font-size="9" letter-spacing="1.5" fill="#E8E2D2" opacity="0.55" stroke="none">
      <text x="0" y="92">PROMPT</text>
      <text x="160" y="-8">IMAGE</text>
      <text x="160" y="132">REF</text>
      <text x="320" y="92">EDIT</text>
      <text x="320" y="172" fill="#DCFF00">VIDEO &#9658;</text>
    </g>
  </g>
</svg>
